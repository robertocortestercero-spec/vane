<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Vanesa ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* inicio */

#inicio{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
padding:20px;
}

button{
padding:15px 40px;
font-size:20px;
background:#ff4da6;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
box-shadow:0 0 20px pink;
}

/* contenido */

#contenido{
display:none;
padding:10px;
}

/* titulo */

h1{
color:#ff4da6;
text-shadow:0 0 20px pink;
font-size:28px;
}

/* imagen grande */

#slider{
width:95%;
max-width:500px;
height:60vh;
margin:10px auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 40px pink;
}

#slider img{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
}

/* frase */

#frase{
font-size:22px;
color:#ffc0cb;
margin-top:15px;
padding:10px;
text-shadow:0 0 10px pink;
}

.firma{
margin-top:10px;
color:#ff80bf;
font-size:18px;
}

/* emojis flotando */

.emoji{
position:absolute;
animation:flotar 8s linear infinite;
}

@keyframes flotar{

0%{
transform:translateY(0) scale(1);
opacity:1;
}

100%{
transform:translateY(-100vh) scale(1.6);
opacity:0;
}

}

</style>
</head>

<body>

<div id="inicio">
<h1>Tengo una sorpresa para ti Vanesa ❤️</h1>
<button onclick="abrir()">Abrir sorpresa</button>
</div>

<div id="contenido">

<h1>Feliz Cumpleaños Vanesa ❤️</h1>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="slider">
<img id="foto" src="foto1.jpeg">
</div>

<div id="frase">Eres el mejor regalo que me dio la vida ❤️</div>

<div class="firma">Con amor, tu werito / tu novio Roberto 💕</div>

</div>

"foto46.jpeg","foto47.jpeg","foto48.jpeg","foto49.jpeg","foto50.jpeg"

/* frases */

let frases=[

"Eres el amor más bonito que llegó a mi vida ❤️",

"Me encanta cada momento contigo",
"Eres el regalo más hermoso que me dio la vida",
"Mi corazón siempre te elegirá",
"No hay nadie como tú en el mundo",
"Eres mi pensamiento favorito",

"Siempre quiero caminar a tu lado",

let i=0;

/* cambiar foto + frase */

function cambiarFoto(){

i++;

if(i>=fotos.length){
i=0;
}

document.getElementById("foto").src=fotos[i];
document.getElementById("frase").innerText=frases[i];

}

setInterval(cambiarFoto,3000);

/* emojis románticos */

let emojis=["❤️","💕","💖","💘","💝","💗","💓","💞","💟","😍","🥰","😘","🌹","💐","✨"];

function crearEmoji(){

let e=document.createElement("div");

e.className="emoji";

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";

e.style.top="100vh";

e.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},8000);

}

setInterval(crearEmoji,200);

</script>

</body>
</html>
