<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Vanesa ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* pantalla inicio */

#inicio{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
}

button{
padding:15px 40px;
font-size:20px;
background:#ff4da6;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
box-shadow:0 0 20px pink;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px #ff4da6;
}

/* contenido */

#contenido{
display:none;
padding-top:10px;
}

h1{
color:#ff4da6;
text-shadow:0 0 25px pink;
margin-top:10px;
}

/* slider fotos */

#slider{
width:70%;
max-width:420px;
height:300px;
margin:20px auto;
overflow:hidden;
border-radius:20px;
box-shadow:0 0 35px pink;
}

#slider img{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
transition:opacity 1s;
}

/* frase */

#frase{
font-size:20px;
color:#ffc0cb;
margin-top:20px;
text-shadow:0 0 10px pink;
}

.firma{
margin-top:15px;
color:#ff80bf;
}

/* corazones */

.heart{
position:absolute;
color:#ff4da6;
animation:flotar 6s linear infinite;
}

@keyframes flotar{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-900px) scale(1.5);
opacity:0;
}
}

/* corazones laterales */

.lado{
position:fixed;
top:0;
width:120px;
height:100vh;
pointer-events:none;
}

.izq{
left:0;
}

.der{
right:0;
}

/* animaciones laterales */

.corazon-lado{
position:absolute;
font-size:25px;
animation:subir 7s linear infinite;
}

@keyframes subir{
0%{
transform:translateY(100vh) scale(0.8);
opacity:1;
}
100%{
transform:translateY(-100px) scale(1.5);
opacity:0;
}
}

/* brillo */

.estrella{
position:absolute;
color:white;
animation:brillar 2s infinite alternate;
}

@keyframes brillar{
from{opacity:0.3;}
to{opacity:1;}
}

</style>

</head>

<body>

<div id="inicio">
<h1>Tengo una sorpresa para ti Vanesa ❤️</h1>
<button onclick="abrir()">Abrir sorpresa</button>
</div>

<div id="contenido">

<h1>Feliz Cumpleaños Vanesa ❤️</h1>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="slider">
<img id="foto" src="foto1.jpeg">
</div>

<div id="frase">Eres el mejor regalo que me dio la vida ❤️</div>

<div class="firma">CON MUCHO AMOR PARA MI PRINCESA HERMOSA, TE AMO MI VIDA💕</div>

</div>

<div class="lado izq" id="ladoIzq"></div>
<div class="lado der" id="ladoDer"></div>

<script>

"foto36.jpeg","foto37.jpeg","foto38.jpeg","foto39.jpeg","foto40.jpeg",
"foto41.jpeg","foto42.jpeg","foto43.jpeg","foto44.jpeg","foto45.jpeg",
"foto46.jpeg","foto47.jpeg","foto48.jpeg","foto49.jpeg","foto50.jpeg"

let frases=[

"Eres el amor más bonito que llegó a mi vida ❤️",
"Cada momento contigo es un recuerdo hermoso",
"Tu sonrisa ilumina todos mis días",
"Contigo todo es más bonito",

"Gracias por existir mi amor",
"Eres el sueño que siempre quise vivir",

"Eres mi felicidad diaria",

"Contigo todo tiene sentido",
"Me encanta cada momento contigo",
"Eres el regalo más hermoso que me dio la vida",
"Mi corazón siempre te elegirá",

"No hay nadie como tú en el mundo",
"Eres mi pensamiento favorito",

let i=0;
let j=0;

function cambiarFoto(){
i++;
if(i>=fotos.length){i=0;}
document.getElementById("foto").src=fotos[i];
}

function cambiarFrase(){
j++;
if(j>=frases.length){j=0;}
document.getElementById("frase").innerText=frases[j];
}

setInterval(cambiarFoto,3000);
setInterval(cambiarFrase,5000);

/* corazones flotando */

function crearCorazon(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=window.innerHeight+"px";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(crearCorazon,300);

/* animaciones laterales */

function crearLado(lado){

let corazon=document.createElement("div");
corazon.className="corazon-lado";

let iconos=["❤️","💕","💖","✨"];
corazon.innerHTML=iconos[Math.floor(Math.random()*iconos.length)];

corazon.style.left=Math.random()*80+"px";

lado.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},7000);

}

setInterval(()=>{
crearLado(document.getElementById("ladoIzq"));
crearLado(document.getElementById("ladoDer"));
},500);

</script>

</body>
</html>
